version: '3.8'

services:
  postgres:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    restart: always
    ports:
      - "6379:6379"

  account-service:
    build: ./account-service
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      DB_USER: user
      DB_PASSWORD: password

  character-service:
    build: ./character-service
    ports:
      - "3002:3002"
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      DB_USER: user
      DB_PASSWORD: password

  combat-service:
    build: ./combat-service
    ports:
      - "3003:3003"
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      DB_USER: user
      DB_PASSWORD: password

volumes:
  postgres_data: